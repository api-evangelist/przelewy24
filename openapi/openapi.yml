tags:
####ADDITIONAL API####
  - name: Transaction service API
    x-displayName: Transaction service API
  - name: Additional API functionality
    x-displayName: Additional API functionality
  - name: Notification
    x-displayName: Notification
    description:
      <div id="PP">
      <h2>Transaction result</h2>

      <SchemaDefinition schemaRef="#/components/schemas/TransactionResult" />

      <h2>Automatic transfer of transaction result</h2>
      In case the first notification of the transaction result is not properly received by the merchant’s system (it is not correctly verified by the merchant's system), P24's system will send subsequent notifications. These will be sent after 3, 5, 15, 30, 60, 150 and 450 minutes (+/- 5 min.), unless the correct transaction verification will take place before that.<br><br><b>POST</b> parameters are the same as in the case of the first notification.
      </div>

  - name: RefundNotification
    x-displayName: Refund Notification
    description:
      <div id="PP">
      <h2>Result of the refund</h2>

      A refund notification is sent asynchronously to the URL provided in the <a href="#tag/Dodatkowa-funkcjonalnosc-API/paths/~1api~1v1~1transaction~1refund/post"><b>transaction/refund</b></a>, in the parameter <b>urlStatus</b>. If <b>urlStatus</b> value is not provided, the notification is sent to the default URL address configured in the P24 panel (if such address had been provided).
      <br/><br/>
      <div id="note"> In order to configure the default URL address, contact Partner Support via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/documents-and-reports/is-your-question-not-answered"><b>contact form </b></a></div><br>

      <SchemaDefinition schemaRef="#/components/schemas/TransactionRefundResult" />
      </div>

  - name: Payment Methods Use Cases
    x-displayName: Payment Methods Use Cases
    description: >
       ## PayPo

       The PayPo payment method is not the default payment method and is available after contacting our Merchant Success department via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/payment-methods-and-account/is-your-question-not-answered"><b>contact form</b></a>.

        After starting the service on your account, you must register the transaction correctly in the request <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>transaction register </b></a> pass additional parameters that are optional by default:
        <code>client</code>, <code>city</code>, <code>zip</code>, <code>address</code>.



        The minimum amount sent in a request for PayPo method is currently PLN 5, its maximum value is PLN 5,000.

 

        PayPo payments are paid after receiving funds from the operator. By default, the merchant will receive the funds within 5 business days.


       ## PayPal

       For the PayPal method to work properly on your website, it must be activated for the account on the Przelewy24 website. In order to activate the PayPal method, please contact us using the e-mail address assigned to your account in the Przelewy24 panel via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/payment-methods-and-account/is-your-question-not-answered"><b>contact form</b></a>.

       To correctly perform a transaction for the indicated method, it is necessary to send the full object <b><a href="https://developers.przelewy24.pl/index.php?pl#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><code>cart</code></a></b> with the required parameters sent in the request <a href="https://developers.przelewy24.pl/index.php?pl#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>transaction register</b></a>.




  - name: Calculating Sign
    x-displayName: Calculating Sign
    description: >
      <div id="PP">

       ### Transaction register

       Below are code snippets for 4 programming languages, demonstrating the correct calculation of the <b>sign</b> checksum for a <b><a href="#tag/Transaction-service-API">transaction registration</a></b> request.
       
       To correctly calculate sign, remember about the correctness of the data (the merchantId and crc parameters are values ​​​​taken from the Przelewy24 panel, and the remaining values ​​​​are set individually for each transaction by the seller) and about the distinction of variable types (merchantId and amount are integer, the rest are string).
       
      
      <b><font color = "#DB2053">IMPORTANT!</font></b><br> Please note that the components of the sign checksum differ for individual requests sent or received from Przelewy24. The sign parameter value that must be passed in the <b><a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">transaction registration</a></b> request is different from the sign value passed for the <b><a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1verify/put">transaction verification</a></b> request.
      
      

      <h3> Examples of calculating the sign checksum for a transaction registration request: </h3>
      <div class="container-to-registration">
      <div class="tabs">
          <div class="tab active">PHP</div>
          <div class="tab">JavaScript</div>
          <div class="tab">Java</div>
          <div class="tab">Python</div>
      </div>
      <div id="php-lang" class="code-container active">
      <pre><code class="language-php"><span class="token variable">$params</span> <span class="token operator">=</span> <span class="token punctuation">[</span>
          <span class="token string single-quoted-string">'sessionId'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'unique-session-id'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
          <span class="token string single-quoted-string">'merchantId'</span> <span class="token operator">=&gt;</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the Seller ID from the Przelewy24 panel</span>
          <span class="token string single-quoted-string">'amount'</span> <span class="token operator">=&gt;</span> <span class="token number">1234</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the transaction amount in groszy, 1234 means PLN 12.34</span>
          <span class="token string single-quoted-string">'currency'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'PLN'</span><span class="token punctuation">,</span> <span class="token comment">// Transaction currency should be placed here</span>
          <span class="token string single-quoted-string">'crc'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'crc-z-panelu-p24'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should place the CRC key downloaded from the Przelewy24 panel</span>
      <span class="token punctuation">]</span><span class="token punctuation">;</span>

      <span class="token comment">// Combining parameters into a string</span>

      <span class="token variable">$combinedString</span> <span class="token operator">=</span> <span class="token function">json_encode</span><span class="token punctuation">(</span><span class="token variable">$params</span><span class="token punctuation">,</span> <span class="token class-name">JSON_UNESCAPED_UNICODE</span> <span class="token operator">|</span> <span class="token class-name">JSON_UNESCAPED_SLASHES</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token comment">// Hashing with SHA-384</span>

      <span class="token variable">$hash</span> <span class="token operator">=</span> <span class="token function">hash</span><span class="token punctuation">(</span><span class="token string single-quoted-string">'sha384'</span><span class="token punctuation">,</span> <span class="token variable">$combinedString</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token keyword">echo</span> <span class="token string single-quoted-string">'The checksum of the parameters is: '</span> <span class="token operator">.</span> <span class="token variable">$hash</span><span class="token punctuation">;</span>

      </code></pre>




      </div>
        <div id="javascript-lang" class="code-container">
      <pre><code class="language-javascript"><span class="token keyword">const</span> params <span class="token operator">=</span> <span class="token punctuation">{</span>
        <span class="token literal-property property">sessionId</span><span class="token operator">:</span> <span class="token string">"unique-session-id"</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
        <span class="token literal-property property">merchantId</span><span class="token operator">:</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the Seller ID from the Przelewy24 panel</span>
        <span class="token literal-property property">amount</span><span class="token operator">:</span> <span class="token number">1234</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the transaction amount in groszy, 1234 means PLN 12.34</span>
        <span class="token literal-property property">currency</span><span class="token operator">:</span> <span class="token string">"PLN"</span><span class="token punctuation">,</span> <span class="token comment">// Transaction currency should be placed here</span>
        <span class="token literal-property property">crc</span><span class="token operator">:</span> <span class="token string">"crc-z-panelu-p24"</span> <span class="token comment">// Here you should place the CRC key downloaded from the Przelewy24 panel</span>
      <span class="token punctuation">}</span><span class="token punctuation">;</span>

      <span class="token comment">// Combining parameters into a string</span>

      <span class="token keyword">const</span> combinedString <span class="token operator">=</span> <span class="token constant">JSON</span><span class="token punctuation">.</span><span class="token function">stringify</span><span class="token punctuation">(</span>params<span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token comment">// Hashing with SHA-384</span>

      <span class="token keyword">const</span> hash <span class="token operator">=</span> crypto<span class="token punctuation">.</span><span class="token function">createHash</span><span class="token punctuation">(</span><span class="token string">'sha384'</span><span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">update</span><span class="token punctuation">(</span>combinedString<span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">digest</span><span class="token punctuation">(</span><span class="token string">'hex'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      console<span class="token punctuation">.</span><span class="token function">log</span><span class="token punctuation">(</span><span class="token string">'The checksum of the parameters is:'</span><span class="token punctuation">,</span> hash<span class="token punctuation">)</span><span class="token punctuation">;</span>

      </code></pre>
      </div>
      <div id="python-lang" class="code-container">
      <pre><code class="language-python"><span class="token keyword">import</span> hashlib

      <span class="token comment"># Parameters in JSON format</span>

      json_string <span class="token operator">=</span> <span class="token string">'{"sessionId":"sessionId","merchantId":999999,"amount":1000,"currency":"PLN","crc":"crc"}'</span>

      <span class="token comment"># Hashing with SHA-384</span>

      checksum <span class="token operator">=</span> hashlib<span class="token punctuation">.</span>sha384<span class="token punctuation">(</span>json_string<span class="token punctuation">.</span>encode<span class="token punctuation">(</span><span class="token string">'utf-8'</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">.</span>hexdigest<span class="token punctuation">(</span><span class="token punctuation">)</span>

      <span class="token keyword">print</span><span class="token punctuation">(</span><span class="token string">'The checksum of the parameters is:'</span><span class="token punctuation">,</span> checksum<span class="token punctuation">)</span>      

      </code></pre>
      </div>
      <div id="java-lang" class="code-container">
      <pre><code class="language-java"><span class="token keyword">import</span> <span class="token import"><span class="token namespace">com<span class="token punctuation">.</span>fasterxml<span class="token punctuation">.</span>jackson<span class="token punctuation">.</span>databind<span class="token punctuation">.</span></span><span class="token class-name">ObjectMapper</span></span><span class="token punctuation">;</span>

      <span class="token keyword">import</span> <span class="token import"><span class="token namespace">java<span class="token punctuation">.</span>nio<span class="token punctuation">.</span>charset<span class="token punctuation">.</span></span><span class="token class-name">StandardCharsets</span></span><span class="token punctuation">;</span>
      
      <span class="token keyword">import</span> <span class="token import"><span class="token namespace">java<span class="token punctuation">.</span>security<span class="token punctuation">.</span></span><span class="token class-name">MessageDigest</span></span><span class="token punctuation">;</span>
      
      <span class="token keyword">public</span> <span class="token keyword">class</span> <span class="token class-name">ChecksumExample</span> <span class="token punctuation">{</span>
            <span class="token keyword">public</span> <span class="token keyword">static</span> <span class="token keyword">void</span> <span class="token function">main</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">[</span><span class="token punctuation">]</span> args<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">Exception</span> <span class="token punctuation">{</span>
            <span class="token class-name">String</span> json <span class="token operator">=</span> <span class="token function">createJson</span><span class="token punctuation">(</span><span class="token string">"sessionId"</span><span class="token punctuation">,</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token number">1000</span><span class="token punctuation">,</span> <span class="token string">"PLN"</span><span class="token punctuation">,</span> <span class="token string">"crc"</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
            <span class="token class-name">String</span> checksum <span class="token operator">=</span> <span class="token function">calculateChecksum</span><span class="token punctuation">(</span>json<span class="token punctuation">)</span><span class="token punctuation">;</span>
            <span class="token class-name">System</span><span class="token punctuation">.</span>out<span class="token punctuation">.</span><span class="token function">println</span><span class="token punctuation">(</span><span class="token string">"The checksum of the parameters is: "</span> <span class="token operator">+</span> checksum<span class="token punctuation">)</span><span class="token punctuation">;</span>
        <span class="token punctuation">}</span>
      
        <span class="token keyword">private</span> <span class="token keyword">static</span> <span class="token class-name">String</span> <span class="token function">createJson</span><span class="token punctuation">(</span><span class="token class-name">String</span> sessionId<span class="token punctuation">,</span> <span class="token keyword">int</span> merchantId<span class="token punctuation">,</span> <span class="token keyword">int</span> amount<span class="token punctuation">,</span> <span class="token class-name">String</span> currency<span class="token punctuation">,</span> <span class="token class-name">String</span> crc<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">Exception</span> <span class="token punctuation">{</span>
          <span class="token keyword">return</span> <span class="token keyword">new</span> <span class="token class-name">ObjectMapper</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">writeValueAsString</span><span class="token punctuation">(</span><span class="token class-name">Map</span><span class="token punctuation">.</span><span class="token function">of</span><span class="token punctuation">(</span>
              <span class="token string">"sessionId"</span><span class="token punctuation">,</span> sessionId<span class="token punctuation">,</span>
              <span class="token string">"merchantId"</span><span class="token punctuation">,</span> merchantId<span class="token punctuation">,</span>
              <span class="token string">"amount"</span><span class="token punctuation">,</span> amount<span class="token punctuation">,</span>
              <span class="token string">"currency"</span><span class="token punctuation">,</span> currency<span class="token punctuation">,</span>
              <span class="token string">"crc"</span><span class="token punctuation">,</span> crc
          <span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
      <span class="token punctuation">}</span>

        <span class="token keyword">private</span> <span class="token keyword">static</span> <span class="token class-name">String</span> <span class="token function">calculateChecksum</span><span class="token punctuation">(</span><span class="token class-name">String</span> json<span class="token punctuation">)</span> <span class="token keyword">throws</span> <span class="token class-name">Exception</span> <span class="token punctuation">{</span>
          <span class="token keyword">byte</span><span class="token punctuation">[</span><span class="token punctuation">]</span> hash <span class="token operator">=</span> <span class="token class-name">MessageDigest</span><span class="token punctuation">.</span><span class="token function">getInstance</span><span class="token punctuation">(</span><span class="token string">"SHA-384"</span><span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">digest</span><span class="token punctuation">(</span>json<span class="token punctuation">.</span><span class="token function">getBytes</span><span class="token punctuation">(</span><span class="token class-name">StandardCharsets</span><span class="token punctuation">.</span><span class="token constant">UTF_8</span><span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
          <span class="token class-name">StringBuilder</span> hexString <span class="token operator">=</span> <span class="token keyword">new</span> <span class="token class-name">StringBuilder</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
          <span class="token keyword">for</span> <span class="token punctuation">(</span><span class="token keyword">byte</span> b <span class="token operator">:</span> hash<span class="token punctuation">)</span> <span class="token punctuation">{</span>
                  hexString<span class="token punctuation">.</span><span class="token function">append</span><span class="token punctuation">(</span><span class="token class-name">String</span><span class="token punctuation">.</span><span class="token function">format</span><span class="token punctuation">(</span><span class="token string">"%02x"</span><span class="token punctuation">,</span> b<span class="token punctuation">)</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
              <span class="token punctuation">}</span>
          <span class="token keyword">return</span> hexString<span class="token punctuation">.</span><span class="token function">toString</span><span class="token punctuation">(</span><span class="token punctuation">)</span><span class="token punctuation">;</span>
          <span class="token punctuation">}</span>
      <span class="token punctuation">}</span>
      </code>
      </pre>
      </div>
      </div>
      
      ### Transaction verification
      
       Special care should be taken when implementing the code to calculate the checksum for the transaction verification request and not only. The <b><a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1verify/put">transaction verification request</a></b>, unlike the transaction registration request, contains one new parameter, namely orderId.
       
       
       The orderId parameter is a parameter set by Przelewy24 and is a numeric transaction identifier (integer type). The orderId value can be captured from the <a href="#tag/Notification"><b>notification</b></a>, which is sent to urlStatus.
       
  
      

      <h3> Examples of calculating the sign checksum for a transaction verification request: </h3>

      <div class="container-to-verification">
      <div class="tabs-verify">
          <div class="tab-verify active">PHP</div>
          <div class="tab-verify">JavaScript</div>
          <div class="tab-verify">Java</div>
          <div class="tab-verify">Python</div>
      </div>


      <div id="php-verify" class="code-container-verify active">
      <pre><code class="language-php"><span class="token variable">$params</span> <span class="token operator">=</span> <span class="token punctuation">[</span>
          <span class="token string single-quoted-string">'sessionId'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'unique-session-id'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
          <span class="token string single-quoted-string">'orderId'</span> <span class="token operator">=&gt;</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the numeric transaction ID received e.g. from a notification</span>
          <span class="token string single-quoted-string">'amount'</span> <span class="token operator">=&gt;</span> <span class="token number">1234</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the transaction amount in groszy, 1234 means PLN 12.34</span>
          <span class="token string single-quoted-string">'currency'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'PLN'</span><span class="token punctuation">,</span> <span class="token comment">// Transaction currency should be placed here</span>
          <span class="token string single-quoted-string">'crc'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'crc-z-panelu-p24'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should place the CRC key downloaded from the Przelewy24 panel</span>
      <span class="token punctuation">]</span><span class="token punctuation">;</span>

      <span class="token comment">// Combining parameters into a string</span>

      <span class="token variable">$combinedString</span> <span class="token operator">=</span> <span class="token function">json_encode</span><span class="token punctuation">(</span><span class="token variable">$params</span><span class="token punctuation">,</span> <span class="token class-name">JSON_UNESCAPED_UNICODE</span> <span class="token operator">|</span> <span class="token class-name">JSON_UNESCAPED_SLASHES</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token comment">// Hashing with SHA-384</span>

      <span class="token variable">$hash</span> <span class="token operator">=</span> <span class="token function">hash</span><span class="token punctuation">(</span><span class="token string single-quoted-string">'sha384'</span><span class="token punctuation">,</span> <span class="token variable">$combinedString</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token keyword">echo</span> <span class="token string single-quoted-string">'The checksum of the parameters is: '</span> <span class="token operator">.</span> <span class="token variable">$hash</span><span class="token punctuation">;</span>

      </code></pre>

      </div>
        <div id="javascript-verify" class="code-container-verify">
      <pre><code class="language-javascript"><span class="token keyword">const</span> params <span class="token operator">=</span> <span class="token punctuation">{</span>
        <span class="token literal-property property">sessionId</span><span class="token operator">:</span> <span class="token string">"unique-session-id"</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
        <span class="token literal-property property">orderId</span><span class="token operator">:</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the numeric transaction ID received e.g. from a notification</span></span>
        <span class="token literal-property property">amount</span><span class="token operator">:</span> <span class="token number">1234</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the transaction amount in groszy, 1234 means PLN 12.34</span>
        <span class="token literal-property property">currency</span><span class="token operator">:</span> <span class="token string">"PLN"</span><span class="token punctuation">,</span> <span class="token comment">// Transaction currency should be placed here</span>
        <span class="token literal-property property">crc</span><span class="token operator">:</span> <span class="token string">"crc-z-panelu-p24"</span> <span class="token comment">// Here you should place the CRC key downloaded from the Przelewy24 panel</span>
      <span class="token punctuation">}</span><span class="token punctuation">;</span>

      <span class="token comment">// Combining parameters into a string</span>

      <span class="token keyword">const</span> combinedString <span class="token operator">=</span> <span class="token constant">JSON</span><span class="token punctuation">.</span><span class="token function">stringify</span><span class="token punctuation">(</span>params<span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token comment">// Hashing with SHA-384</span>

      <span class="token keyword">const</span> hash <span class="token operator">=</span> crypto<span class="token punctuation">.</span><span class="token function">createHash</span><span class="token punctuation">(</span><span class="token string">'sha384'</span><span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">update</span><span class="token punctuation">(</span>combinedString<span class="token punctuation">)</span><span class="token punctuation">.</span><span class="token function">digest</span><span class="token punctuation">(</span><span class="token string">'hex'</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      console<span class="token punctuation">.</span><span class="token function">log</span><span class="token punctuation">(</span><span class="token string">'The checksum of the parameters is:'</span><span class="token punctuation">,</span> hash<span class="token punctuation">)</span><span class="token punctuation">;</span>

      </code></pre>
