        Parameters required to call the widget or the simulator:

         
        |  Parametr       |   Description    |
        |--------------|:----------------------|
        | sign |	Calculated as <code>sha384({„crc”:”string”,”posId”:int,”method”:int})</code> |
        | posId | Shop ID (by default Partner ID) |
        | method | By default 303 |
        | amount | Amount in grosz | 
        | lang | Allowed: pl |
        | currency | Allowed: PLN | 

        
        Parameters optional to call the widget or the simulator:
        
       |  Parametr       |   Description    |
        |--------------|:----------------------|
        | test |	Allowed: true, false |

        When the test parameter is sent with the value <i>`true`</i>, the `sign`, `posId` and `method` fields are not validated, but must instead be passed in the `config` object.