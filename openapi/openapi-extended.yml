paths:
   /api/v1/transaction/register:
    post:
      tags:
        - Transaction service API
      summary: Transaction registration
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequestBody1"
        description: Before sending the transaction request, transaction data must be saved
          in the merchant’s local database. In particular, the session ID and
          the transaction amount should be stored. <br><br><hr>
          <h3>Redirection to transaction panel</h3>
          URL address:https://secure.przelewy24.pl/trnRequest/{TOKEN}<br><br>
          where {TOKEN} was obtained upon transaction registration.<br>
          <hr><br>

          On transaction success the URL address transferred in  <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>"urlStatus"</b></a> parameter is used to send notification irrespective of whether the customer has been redirected to  <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>"urlReturn"</b></a> or not. The notification is sent only for correct payments. The system does not send information on invalid or failed payments. The notification is sent in the JSON format.<br><br>
          <a href="#tag/Notification"><font color = "red"><b>Show Transaction result JSON</b></font></a>

        required: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionRegistrationResponse"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInputData"
        "401":
          description: not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
      security:
        - basicAuth: []
   /api/v1/transaction/verify:
    put:
      tags:
        - Transaction service API
      summary: Transaction verification
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionVerificationBody"
        description: After receiving notification, the merchant’s system should perform an
          additional action to confirm the payment and authenticate the
          notification. It is necessary to use transaction/verify method.<br><br>
          **Important!** Transaction will be confirmed only after verification process. In case the customer performs transaction and merchant does not verify performed transaction, amount will not be transferred to the merchant and settled. It will stay at the customer’s disposal as an advance payment.
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionVerificationResponse"
        "400":
          description: bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInputData"
        "401":
          description: not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
      security:
        - basicAuth: []

   /api/v1.1/transaction/register/simp:
      post:
        tags:
          - Additional services Mass Payments Transactions
        summary: Mass payments transaction register
        description:
          Before sending a transaction request, save its data to the Partner's local database. In particular, the session ID and transaction amount information should be saved.<br/>
          <br/>The request takes analogous values to the request <a href="#tag/Transaction-service-API/paths/~1v1.1~1transaction~1register/post"><b> transaction/register</b></a>, except for two additional parameters used when requesting <a href="#tag/Additional-services-SIMP-Transactions/paths/~1v1~1transaction~1register~1simp/post"><b> transaction/register/simp</b></a> czyli <b>simpCountryCode</b> and <b>simpClientId</b>.
        requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionRegistrationSIMPBody"
        responses:
          "200":
            description: Successful operation
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SIMPTransactionRegistrationResponse"
          "400":
            description: Invalid input data
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SIMPResponse400"
          "401":
            description: Not authorized
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/UnauthorizedResponse"
          "409":
            description: Conflict
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/SIMPConflict"
          "500":
            description: Undefined error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/ErrorCodeResponse"
        security:
          - basicAuth: []
   /api/v2/transaction/by/sessionId/{sessionId}:
     get:
       tags:
         - Additional services Mass Payments Transactions
       summary: Data about transaction via sessionID
       description: The method returns transaction information based on the <b>sessionId</b> field. For a single sessionId within a SIMP payment, multiple payments can be made on the IBAN, hence the API can return multiple objects.
       parameters:
         - in: path
           name: sessionId
           schema:
             type: string
           required: true
           description: SessionId of the transaction given during transaction registration
       responses:
         "200":
           description: Successful operation
           content:
             application/json:
               schema:
                 $ref: "#/components/schemas/SIMPGetTransactionBySessionId200"
         "400":
           description: Invalid input data
           content:
             application/json:
               schema:
                 $ref: "#/components/schemas/InvalidInputData"
         "401":
           description: Incorrect Authentication
           content:
             application/json:
               schema:
                 $ref: "#/components/schemas/UnauthorizedResponse"
         "500":
           description: Undefined error
           content:
             application/json:
               schema:
                 $ref: "#/components/schemas/ErrorCodeResponse"
       security:
         - basicAuth: []
   /api/v1/testAccess:
    get:
      tags:
        - Additional API functionality
      summary: Test Access
      description: Test connection. REST uses  <a href="#section/Authentication"><b>"basicAuth"</b></a> authorisation standard, where login and password are, respectively, account ID in P24 and the API key obtained from the “My data” section (“API and configuration data” subsection).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionTestAccess200"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInputData"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
      security:
        - basicAuth: []
   /api/v1/payment/methods/{lang}?amount=150&subgroup=1&currency=PLN:
    get:
      tags:
        - Additional API functionality
      summary: Payment Methods
      description: Method returns a list of payment methods.
      parameters:
        - name: lang
          in: path
          description: "A language code. One of these: pl , en"
          required: true
          schema:
            type: string
            enum:
              - pl
              - en
        - in: query
          name: amount
          schema:
            type: integer
          description: Value of the amount.<br>It gives the possibility of clarifying whether a given form of payment is available for a specific amount.
          required: false
        - in: query
          name: currency
          schema:
            type: string
            default: PLN
          description: Currency compatible with ISO, e.g. PLN
          required: false
        - in: query
          name: subgroup
          schema:
            type: integer
            enum:
              - 1
              - 0
          description: Condition if the subgroup value should be visible in the response. Default 0 (NO). Optional 1 (YES).
          required: false

      responses:
        "200":
          description: List of payment methods
          content:
            application/json:
              schema:
                properties:
                  data:
                    type: array
                    description: List of methods
                    items:
                      $ref: "#/components/schemas/PaymentMethodsResponseMethod"
                  agreements:
                    type: array
                    description: List of agreements
                  responseCode:
                    type: string
                    default: ""
                type: object
        "403":
          description: Not authorized.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
        "404":
          description: Payment methods not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicResponse"
      security:
        - basicAuth: []
   /api/v1/transaction/refund:
    post:
      tags:
        - Additional API functionality
      summary: Refund transaction
      description: Create refund for one or more transactions.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRefundJsonRequestBody'
        description: 'Parameter ''refunds'' may contain multiple refunds.'
        required: true
      responses:
        "201":
          description: 'Created. Parameter ''data'' contains all refunds.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRefund201'
        "400":
          description: 'Invalid input data'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidInputDataRefund'
        "401":
          description: 'Not authorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedResponse'
        "409":
          description: 'Conflict'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionRefund409'
        "500":
          description: 'Unknown error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund500Response'
      security:
        - basicAuth: []
