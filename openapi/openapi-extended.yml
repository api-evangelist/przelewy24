tags:
####ADDITIONAL API####
  - name: Transaction service API
    x-displayName: Transaction service API
  - name: Additional API functionality
    x-displayName: Additional API functionality
  - name: Notification
    x-displayName: Notification
    description:
      <div id="PP">
      <h2>Transaction result</h2>

      <SchemaDefinition schemaRef="#/components/schemas/TransactionResult" />

      <h2>Automatic transfer of transaction result</h2>
      In case the first notification of the transaction result is not properly received by the merchant’s system (it is not correctly verified by the merchant's system), P24's system will send subsequent notifications. These will be sent after 3, 5, 15, 30, 60, 150 and 450 minutes (+/- 5 min.), unless the correct transaction verification will take place before that. <br><br><b>POST</b> parameters are the same as in the case of the first notification.
      </div>

  - name: RefundNotification
    x-displayName: Refund Notification
    description:
      <div id="PP">
      <h2>Result of the refund</h2>

      A refund notification is sent asynchronously to the URL provided in the <a href="#tag/Dodatkowa-funkcjonalnosc-API/paths/~1api~1v1~1transaction~1refund/post"><b>transaction/refund</b></a>, in the parameter <b>urlStatus</b>. If <b>urlStatus</b> value is not provided, the notification is sent to the default URL address configured in the P24 panel (if such address had been provided).
      <br/><br/>
      <div id="note"> In order to configure the default URL address, contact Partner Support via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/payment-methods-and-account/is-your-question-not-answered" target="_blank">contact form</a><br/></div><br>

      <SchemaDefinition schemaRef="#/components/schemas/TransactionRefundResult" />
      </div>


  - name: Payment Methods Use Cases
    x-displayName: Payment Methods Use Cases
    description: >
       ## PayPo

       The PayPo payment method is not the default payment method and is available after contacting our Merchant Success department via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/payment-methods-and-account/is-your-question-not-answered"><b>contact form</b></a>.

        After starting the service on your account, you must register the transaction correctly in the request <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>transaction register </b></a> pass additional parameters that are optional by default:
        <code>client</code>, <code>city</code>, <code>zip</code>, <code>address</code>.



        The minimum amount sent in a request for PayPo method is currently PLN 5, its maximum value is PLN 5,000.

 

        PayPo payments are paid after receiving funds from the operator. By default, the merchant will receive the funds within 5 business days.


       ## PayPal

       For the PayPal method to work properly on your website, it must be activated for the account on the Przelewy24 website. In order to activate the PayPal method, please contact us using the e-mail address assigned to your account in the Przelewy24 panel via <a href="https://www.przelewy24.pl/en/help-center/i-sell-with-przelewy24/payment-methods-and-account/is-your-question-not-answered"><b>contact form</b></a>.

       To correctly perform a transaction for the indicated method, it is necessary to send the full object <b><a href="https://developers.przelewy24.pl/index.php?pl#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><code>cart</code></a></b> with the required parameters sent in the request <a href="https://developers.przelewy24.pl/index.php?pl#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>transaction register</b></a>.

  - name: Calculating Sign
    x-displayName: Calculating Sign
    description: >
      <div id="PP">

       ### Transaction register

       Below are code snippets for 4 programming languages, demonstrating the correct calculation of the <b>sign</b> checksum for a <b><a href="#tag/Transaction-service-API">transaction registration</a></b> request.
       
       To correctly calculate sign, remember about the correctness of the data (the merchantId and crc parameters are values ​​​​taken from the Przelewy24 panel, and the remaining values ​​​​are set individually for each transaction by the seller) and about the distinction of variable types (merchantId and amount are integer, the rest are string).
       
      
      <b><font color = "#DB2053">IMPORTANT!</font></b><br> Please note that the components of the sign checksum differ for individual requests sent or received from Przelewy24. The sign parameter value that must be passed in the <b><a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">transaction registration</a></b> request is different from the sign value passed for the <b><a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1verify/put">transaction verification</a></b> request.
      
      

      <h3> Examples of calculating the sign checksum for a transaction registration request: </h3>
      <div class="container-to-registration">
      <div class="tabs">
          <div class="tab active">PHP</div>
          <div class="tab">JavaScript</div>
          <div class="tab">Java</div>
          <div class="tab">Python</div>
      </div>
      <div id="php-lang" class="code-container active">
      <pre><code class="language-php"><span class="token variable">$params</span> <span class="token operator">=</span> <span class="token punctuation">[</span>
          <span class="token string single-quoted-string">'sessionId'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'unique-session-id'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
          <span class="token string single-quoted-string">'merchantId'</span> <span class="token operator">=&gt;</span> <span class="token number">999999</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the Seller ID from the Przelewy24 panel</span>
          <span class="token string single-quoted-string">'amount'</span> <span class="token operator">=&gt;</span> <span class="token number">1234</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the transaction amount in groszy, 1234 means PLN 12.34</span>
          <span class="token string single-quoted-string">'currency'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'PLN'</span><span class="token punctuation">,</span> <span class="token comment">// Transaction currency should be placed here</span>
          <span class="token string single-quoted-string">'crc'</span> <span class="token operator">=&gt;</span> <span class="token string single-quoted-string">'crc-z-panelu-p24'</span><span class="token punctuation">,</span> <span class="token comment">// Here you should place the CRC key downloaded from the Przelewy24 panel</span>
      <span class="token punctuation">]</span><span class="token punctuation">;</span>

      <span class="token comment">// Combining parameters into a string</span>

      <span class="token variable">$combinedString</span> <span class="token operator">=</span> <span class="token function">json_encode</span><span class="token punctuation">(</span><span class="token variable">$params</span><span class="token punctuation">,</span> <span class="token class-name">JSON_UNESCAPED_UNICODE</span> <span class="token operator">|</span> <span class="token class-name">JSON_UNESCAPED_SLASHES</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token comment">// Hashing with SHA-384</span>

      <span class="token variable">$hash</span> <span class="token operator">=</span> <span class="token function">hash</span><span class="token punctuation">(</span><span class="token string single-quoted-string">'sha384'</span><span class="token punctuation">,</span> <span class="token variable">$combinedString</span><span class="token punctuation">)</span><span class="token punctuation">;</span>

      <span class="token keyword">echo</span> <span class="token string single-quoted-string">'The checksum of the parameters is: '</span> <span class="token operator">.</span> <span class="token variable">$hash</span><span class="token punctuation">;</span>

      </code></pre>




      </div>
        <div id="javascript-lang" class="code-container">
      <pre><code class="language-javascript"><span class="token keyword">const</span> params <span class="token operator">=</span> <span class="token punctuation">{</span>
        <span class="token literal-property property">sessionId</span><span class="token operator">:</span> <span class="token string">"unique-session-id"</span><span class="token punctuation">,</span> <span class="token comment">// Here you should put the unique generated session ID</span>
