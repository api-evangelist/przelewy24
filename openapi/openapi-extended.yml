      <p style="border:1.5px;border-style:solid;border-color:#FF0000;padding:1em;"><b><font size=2px>Note!</b><br/>To ensure proper implementation of the solution:<br>- for <b><a href="#tag/Form-initialization">card methods</a></b> method 241 or 242 is required to be enabled - in accordance with business arrangements<br>- for <b><a href="#tag/Google-Pay">Google Pay</a></b> method 264 or 265 is required to be enabled - in accordance with business arrangements<br>- for <b><a href="#tag/Apple-Pay">Apple Pay</a></b> method 252 or 253 is required to be enabled - in accordance with business arrangements</font></b></p>

  - name: Form initialization
    x-displayName: Form initialization (SDK)
    description: >
      Card transaction processing is based on JavaScript downloaded from Przelewy24 server. Payment card transactions are effected by calling the iFrame window based on the ready-made SDK indicating the Przelewy24 library. The library contains all offered objects and related methods used for correct form integration. 
      
      
      Library call: 

        ```javascript
        <script src="https://secure.przelewy24.pl/js/cardTokenizationIframe.min.js"></script>
       ```

      In order to generate the card form in iFrame, the method must be called in the following way, using the library implemented: 
      <br>

        ```javascript
         /* Initialize card form */
        const P24 = new Przelewy24CardTokenization(merchantId,"sessionId","sign");

       /* Render the iFrame form and additional styling settings */
        const options = {};    
        P24.render("type", "#id", options);
        ```

        In order for class P24 to be properly implemented, relevant values for the specific parameters must be provided during the implementation process, consistent with the scheme provided below:
         <br><br>
        <SchemaDefinition schemaRef="#/components/schemas/przelewy24"/>
        <br><br>
        In order for the card form to be displayed correctly on the page, you must call the method `P24.render("type", "#id", options)` where `"type"` means the type of the presented form, `"#id"` is the HTML identifier of the block , where the form is to be displayed, and `options`, which contains additional information about <a href="#tag/Form-initialization/Styling-and-form-options">form styling.</a>
        <SchemaDefinition schemaRef="#/components/schemas/render"/>
      
      ## Styling and form options 
      
      The `options` object, the third attribute of `P24.render()` method, accepts objects with the following values rendering the possibility of editing the card form and its layout freely.  
        <SchemaDefinition schemaRef="#/components/schemas/options"/>

      Additionally, the form allows to call `P24.clear()` method, to be used if a given field of the form is to be cleared. 

       ```javascript
        /* Initialize card form */
        const P24 = new Przelewy24CardTokenization(merchantId,"sessionId","sign");

        /* Render the iFrame form and additional styling settings */
        const options = {};    
        P24.render("type", "#id", options);

        /* Invoking card tokenization with the appropriate type after pressing the button */
        const clearAll = document.getElementById("clearAll");

        clearAll.addEventListener('click', function () {
            P24.clear();
        })

        ```
       
       
        The `P24.clear()` function may have the following attributes:<br>
        `"card"` - clears the card number field,<br>
        `"cvv"` -  clears the card CVV/CVC field,<br>
        `"exp"` - clears the card expiry date field,<br>
        `"cardholder"` - clears the cardholder details field.<br>
        Calling the function without function arguments results in clearing all the fields of the form.

