   /api/v1/transaction/doPayment:
    post:
      tags:
        - Recursion (doPayment)
      summary: Transaction without JS/SDK
      requestBody:
        description: In order to register a recurring transaction, it is necessary to send transaction registration request first to `transaction/register` endpoint, consistent with the parameters set out in <a href="#tag/Recursion-(doPayment)">Recursion</a> section. 
        content:
          application/json:
            schema:
              properties:
                requestId:
                  type: string
                  description: RequestId must follow the UUIDv4 format
                token:
                  type: string
                  description: Transaction token returned from transaction registration request
              required:
                - requestId
                - token
              type: object
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                properties:
                  token:
                    type: string
                    description: Transaction token
                  sessionId:
                    type: string
                    description: Unique transaction's sessionId
                  status:
                    type: string
                    description: "Status of created transaction, possible: DONE"
                  data:
                    properties:
                      url:
                        type: string
                        description: URL redirecting to 3DS
                      type:
                        type: string
                        description: URL call method
                      payload:
                        type: array
                        description: Payload
                      headers:
                        properties:
                          content-type: 
                            type: string
                            description: "text/html; charset=UTF-8"                          
                    type: object
                    description: If in the transaction registration request in the cardData object the transactionType parameter contains the value "recurring", then the object is empty. Otherwise, data such as a link with a redirection to 3DS verification will be passed in the data object.
                type: object
                required:
                  - token
                  - sessionId
                  - status
        201:
          description: Created
          content:
            application/json:
              schema:
                properties:
                  token:
                    type: string
                    description: Transaction token
                  sessionId:
                    type: string
                    description: Unique transaction's sessionId
                  status:
                    type: string
                    description: "Status of created transaction, possible: DONE"
                  data:
                    properties:
                      url:
                        type: string
                        description: URL redirecting to 3DS
                      type:
                        type: string
                        description: URL call method
                      payload:
                        type: array
                        description: Payload
                      headers:
                        properties:
                          content-type: 
                            type: string
                            description: "text/html; charset=UTF-8"                          
                    type: object
                    description: If in the transaction registration request in the cardData object the transactionType parameter contains the value "recurring", then the object is empty. Otherwise, data such as a link with a redirection to 3DS verification will be passed in the data object.
                type: object
                required:
                  - token
                  - sessionId
                  - status
        400:
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvalidInputData"
        401:
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnauthorizedResponse"
      security:
        - basicAuth: []

####components######
components:
  securitySchemes:
   basicAuth:
      description: This is the default authentication method. User and secretId are available in P24 panel:<br/>- "User" it's the same value as posId,<br/>- secretId it's the samevalue as key for reports (API key).
      type: http
      scheme: basic
  schemas:
    przelewy24:
      required:
        - merchantId
        - sessionId
        - sign
      properties:
        merchantId:
          type: integer
          description: Merchant identification number
        sessionId:
          type: string
          description: Unique identifier from merchant's system
        sign:
          type: string
          description: Checksum of parameters:<br>
            {<font color = "brown">"merchantId":</font>int,<font color = "brown">"sessionId":</font>"string",<font color = "brown">"crc":</font>"string"}
            <br><br>calculated with the use of sha384<br><br> <b><font color = "#DB2053">IMPORTANT!:</font></b><br> in case json_encode function is used, the following attributes should be added <br> "JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES"
      type: object  
    render:
          required:
            - type
            - id
          properties:
            type:
              type: string
              default: "form"
              enum:
                - form
              description: Type of form
            id:
              type: string
              example: "#card-form-block"
              description: ID of the block in which the iFrame will be generated
            options:
              type: object
              description: Additional form styling options 
          type: object  
    options:
      properties:
        lang:
          type: string
          description: Default form language
          default: "pl"
          example: "pl"
        size:
          type: object
          description: Object that modifies the size of an iFrame
          properties:
            width:
              type: string
              description: "Width"
              default: "500px"
              example: "500px"
            height:
              type: string
              description: "Height"
              default: "500px"
              example: "500px"
        labels:
          type: object
          description: "Object that modifies the labels of an fields"
          properties:
            cardholder:
              type: string
              description: "Text visible as the label of the cardholder field"
              example: "Name and surname of the card holder"
            card:
              type: string
              description: "Text visible as the label of the card number field"
              example: "Card number"
            cvv:
              type: string
              description: "Text visible as the label of the card's CVV/CVC number field"
              example: "Card CVV/CVC number"
            exp:
              type: string
              description: "Text visible as the label of the card expiration date field"
              example: "Card expiration date"
        agreement:
          type: object
          description: "An object that modifies the visibility and language of the TOS (Terms Of Services) field"
          properties:
            contentEnabled:
              type: object
              description: "An object that modifies the visibility of Terms Of Services elements"
              properties:
                enabled:
                  type: boolean
                  description: "Should information about regulations and information obligations be displayed?"
                  example: true
                checkboxEnabled: 
                 type: boolean
                 description: "Should a checkbox be displayed confirming that you have read the regulations and the information obligation?"
                 example: true
            TOSLanguage:
              type: string
              description: "Defines in what language the Terms Of Services text will be displayed"
              example: "pl"                 
        placeholders:
          type: object
          description: Object that modifies text visible in individual elements
          properties:
            card:
              type: string
              description: "Text visible in card element"
              example: "Enter your card number"
            cvv:
              type: string
              description: "Text visible in cvv element"
              example: "Enter your card's CVV number"
            exp:
              type: string
              description: "Text visible in the expire date element"
              example: "Enter your expired card's date"
            cardholder:
              type: string
              description: "Text visible in cardholder element"
              example: "Enter the name and surname of the card holder"
        styles:
          type: object
          description: "Conditions style modifying object"
          properties:
