  - name: Pre-authorization
    x-displayName: Pre-authorization
    description:  >
     The card payment process is divided into two stages:

      - card authorisation/pre-authorisation – takes place when the card organisation verifies possibility of card payment. The organisation checks if cardholder has sufficient funds to process transaction. On positive verification, transaction is authorised and the amount is blocked on the account of the cardholder. The amount is not sent for clearing yet, so it is not transferred to merchant. Transfer takes place on completion of the authorisation process

      - completion of card authorisation/pre-authorisation (Capture) – takes place, when merchant sends confirmation to the card organisation that the transaction between merchant and customer has been concluded. Funds are transferred for clearing and paid to the merchant. Authorisation completion may not concern the full amount of transaction. In case the authorisation of a partial amount is completed, the remaining amount is released <br/><br/>

      In case the authorisation/pre-authorisation fails, following options are possible:<br/><br/>

      - cancellation of card authorisation/pre-authorisation – takes place when merchant does not send confirmation of concluded transaction to the card organisation. Funds are not transferred to merchant and the amount blocked on the customer’s card is released<br/><br/>

      The service allows to separate the following steps: Authorisation, Capture.


     ## Service implementation
        The implementation of the service is analogous to REST v1 standard process.

     ## Transaction registration CARD
      The transaction is registered by <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"><b>transaction/register</b></a> method.

     ## Notification obtaining
        <a href="#tag/Notification"><b>Notification</b></a> obtaining proceeds as in the case of a standard transaction.

        Once the notification is sent, the card payment is only authorised, i.e. a blocked amount appears on the account of the cardholder. If verification is not successful, the payment will not be cleared and the blocked amount is released.

        In case of the above mentioned functionality, the system does not expect any return transaction verification. The transaction is considered as completed once merchant responds with code HTTP 200. If there is no correct response, the notification is re-sent at the same time intervals as in standard cases.


     ## Transaction verification
        Transaction verification is carried out with the <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1verify/put"><b>transaction/verify</b></a> method.

        The only difference is that it is possible to send smaller amount than amount of Pre-authorisation, (i.e. the amount provided during token registration). The amount must be higher than 0.

        The <b>"sign"</b> parameter is calculated based on the current value of <b>"amount"</b> parameter.

        Transaction amount is overwritten. As a result of a successful verification, authorisation completion (capture) including the amount of the verification is sent to the card operator. Requested amount is transferred for clearing and the remaining amount is released.

        Transaction status changes to 2 (completed).

        In case of an incorrect status on the card operator side, the P24 transaction changes its status to current and a relevant notification is generated in the API.


     ## Transaction rejection
        The release of funds (cancellation of authorisation) is carried out with the <a href="#tag/Card-API/paths/~1api~1v1~1transaction~1reject/put"><b>transaction/reject</b></a> method.


        Transaction cancellation request is sent to the card operator and the P24 transaction changes its status to 3 (returned).

        In case of incorrect status on the card operator side, the P24 transaction changes its status to current, and a relevant notification is generated in the API.


     ## One-click and recurrence
        One-click and recurrence proceed analogically to the traditional payment. The process has been devided into two stages (authorisation and capture). Pre-authorisation process is available only in REST communication, which requires transaction verification.


     ## Collecting card details
        Collecting card details from pre-authorised transactions proceeds as in the case of the traditional payment so it is delivered by <a href="#tag/Notification"><b>additional notification</b></a>. It is also possible to use the REST <a href="#tag/Card-API/paths/~1v1~1card~1info~1{orderId}/get"><b>Card/Info</b></a> method.

