  - name: Google Pay
    x-displayName: Google Pay
    description: >
  
      ## Communication scheme
        Once the „Pay with Google Pay” button is clicked, the Google Pay payment form will be displayed on the customer’s screen. The customer confirms their Google account and the card to be used for payment (at this stage, they may change the card to an earlier added one or add a new card). The background script transfers encrypted card data with postMessage function which the shop must receive and subsequently encrypt with Base64 function.<br><br>

        On its website, the shop must call the script made available by Google. For details, see: <br><br>
        <a href=https://developers.google.com/pay/api/web/guides/tutorial>https://developers.google.com/pay/api/web/guides/tutorial</a><br><br>

        In order to add Przelewy24, modify the Processor data in the script call:

        ```javascript
          var tokenizationSpecification =
          {
          tokenizationType: 'PAYMENT_GATEWAY',
          parameters:
            {
              gateway: 'przelewy24',
              gatewayMerchantId: '[MerchantID from P24]'
            }
          }
        ```
      ## Transaction registration

        Transaction registration with Google Pay involves adding two additional parameters in the <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"> transaction registration request</a> in the `"cardData > means > xPayPayload"` object. The value obtained from Google via <b>postMessage (paymentMethodToken.token)</b> and encrypted with base64 function, as well as the `“type”` parameter with the `“googlepay”` value must be provided in the `“payload”` parameter.

        <table border="0 px">
          <tr>
            <th bgcolor = "#9FFF9F"><font color = "black"><b>POST</b></font></th>
            <th bgcolor = "#B8F0D0"><a href= '#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post'>https://secure.przelewy24.pl/api/v1/transaction/register</a></th>
          </tr>
          </table>

        Additional <b>POST</b> call parameter

        | Field name   |      Type      |  Required | Description |
        |--------------|:--------------:|----------:|------------:|
        | cardData > means > xPayPayload |     STRING     | Y     |Token obtained from Google Pay, encrypted with base64 function|
        | type |     STRING     | Y     |Enter “googlepay” value in “type” parameter|

        Before sending the transaction request, the transaction data must be saved to the seller’s local database. In particular, information on session ID and transaction amount must be saved.

        In order to allow uniform website and mobile app design, a set of dedicated guidelines has been made available at https://developers.google.com/pay/api/web/guides/brand-guidelines

        Advice on developing mobile applications is available at https://developers.google.com/pay/api/android/guides/tutorial

####APAY####
  - name: Apple Pay
    x-displayName: Apple Pay
    description: >

      ## Requirements 

      <b> Web domain certification: </b> Transaction processing with ApplePay requires the Seller to register merchant ID and proceed to domain certification. The description of the process is available at  <a href="https://developer.apple.com/documentation/apple_pay_on_the_web/configuring_your_environment">https://developer.apple.com/documentation/apple_pay_on_the_web/configuring_your_environment</a>.<br><br>

      <b> Creating Apple Pay Payment Processing Certificate: </b>
      <div id="note"> Before proceeding with the process of creating a certificate, obtain a CSR file (for detailed information, please contact the Implementation Department of Przelewy24 via <a href="https://www.przelewy24.pl/en/help-center/integration-support"><b>contact form</b></a>). </div>
    


      After logging in to your Apple Developer account:
      - select the Certificates, IDs & Profiles option,

      - select the Identifiers / Merchant IDs option,

      - select the Merchant ID created in the previous step and go to the Edit option,

      - select the Create Certificate option in the Apple Pay Payment Processing Certificate section,

      - select the Continue option,

      - upload the CSR file received from the Przelewy24 Implementation Department, using the Choose File option,

      - download the generated certificate and forward it to the Przelewy24 Implementation Department.

      ## Communication Scheme

      Once the „ApplePay” button is clicked, the Apple payment form will be displayed on the customer’s screen. The customer selects the card saved in the device. The background script transfers encrypted card data in paymentData object which the shop must receive, subsequently encrypt again with base64 function and send in the <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"> transaction registration request</a>.

      The store must run the script provided by Apple on its website (details available at: <a href="https://developer.apple.com/documentation/apple_pay_on_the_web">https://developer.apple.com/documentation/apple_pay_on_the_web </a>).


      The script in the background transfers encrypted card data which the shop must receive, subsequently encrypt again with base64 function and send in the <b>payload</b> parameter along with other transaction details.

      ## Transaction Registration

        Transaction registration with Apple Pay involves adding two additional parameters in the <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">transaction registration request</a>  in `"cardData > means > xPayPayload"` object. The value obtained via <b>postMessage (paymentMethodToken.token)</b> and encrypted with base64 function, as well as the `“type”` parameter with the `“applepay”` value must be provided in the `“payload”` parameter.

        <table border="0 px">
          <tr>
            <th bgcolor = "#9FFF9F"><font color = "black"><b>POST</b></font></th>
            <th bgcolor = "#B8F0D0"><a href= '#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post'>https://secure.przelewy24.pl/api/v1/transaction/register</a></th>
          </tr>
        </table>

        Additional **POST** call parameter

        | Field name   |      Type      |  Required | Description |
        |--------------|:--------------:|----------:|------------:|
        | cardData > means > xPayPayload   |     STRING     | Y     |Token obtained from Apple Pay, encrypted with base64 function|
        | type |     STRING     | Y     |Enter “applepay” value in “type” parameter|

        ##  Additional Information
      
        In order to allow uniform website and mobile app design, follow the provided guidelines in the course of implementing the ApplePay service. The description of the styles and buttons for websites is available at <a target="_blank" href="https://developer.apple.com/apple-pay/acceptable-use-guidelines-for-websites/">https://developer.apple.com/apple-pay/acceptable-use-guidelines-for-websites/</a>.

  - name: Buttons and banners
    x-displayName: "Buttons and banners"
    description: >
      


      ### Instalments – Introduction

    
      BNPL solutions may be a way to increase the turnover and reduce the rate of abandoned carts at your shop. Yet, the activation of online instalments alone on the payment wall will not bring about the desired effect (... or the effect will be limited). 


      It is the correct exposure on your shop’s website that allows to harvest  the full potential of online instalments. This guide will let you find out how to go about it.


      Minimalism is a good practice in UX, but forget it if you want your customers to select instalment payments. If you want to reach the buyers who select this method to pay for their orders, make sure they learn about it before the order is finalised.
      
      Inform your customers that it is possible to divide the payment into instalments at each step of the shopping path:<br>
      •    on the main webpage,<br>
      •    on the list of products<br>
      •    on the product card and<br>
      •    at checkout<br>


      Be aware of the fact that customers who choose to pay in instalments usually have limited funds at their disposal. While still determined to make the purchase, they are looking for the most advantageous offer.


      Post information on instalments on the main webpage. Use a slider or a top banner.


      <img src="getfile/raty-slider.png" alt="raty-slider" class="center smallImg">

      
      This is how you’ll reach a wide circle of customers. Newcomers will get the signal that they may pay in instalments.

      
      Add the instalments logo to the payment methods presented in the webpage’s footer. That’s one of the key spots where customers look for information on the payment methods available.



      <img src="getfile/raty-stopka.png" alt="raty-stopka" class="center smallImg">


      If your website is internally complex (categories, subcategories), place the “Buy in instalments” button on the subpages as well.


      <img src="getfile/raty-tu-kupisz-na-raty.png" alt="raty-tu-kupisz-na-raty" class="center smallImg">


      Informing customers on the availability of payment in instalments on product cards serves to increase the conversion of this payment method by over 40%, while it is only 8% when the information is provided as late as at the cart stage or at checkout.
      The minimum option is static graphic ads. Thanks to them, you will let your customer know that Przelewy24 Instalments service is available.


      <img src="getfile/raty-karta-produktu.png" alt="raty-karta-produktu" class="center smallImg">


      List of products is yet another spot where you can attract your customers to make quicker shopping decisions or to add additional products to their carts.
      
      
      Basket / order summary - this is where placing information on instalments is a must. 
      Home stretch. You don’t want your customer to abandon the cart at this point. Give a clear signal concerning the finalisation of instalment payments. Remember that at this stage the customer will already have selected the payment method, so make sure you keep telling them about instalments from the very start of their purchasing journey.


      
      <img src="getfile/raty-koszyk.png" alt="raty-koszyk" class="center smallImg">


      Checkout - place the instalment payment method at checkout.


      <img src="getfile/raty-checkout.png" alt="raty-checkout" class="center smallImg">

      To find out how to display a given payment method, visit 

      <a href="#tag/Use-cases/How-to-display-a-full-selection-of-payment-methods-in-your-shop">How to display the full selection of payment methods on the shop’s website?</a>
      
      
      By default, the instalment method is available as method=303. Redirection should be done in compliance with the z <a href="#tag/Use-cases/How-to-redirect-a-customer-to-specific-method-of-payment">guidelines</a> 

      
      All graphic materials are available here:  (https://www.przelewy24.pl/storage/app/media/do-pobrania/p24_raty/p24_raty_materialy_graficzne.zip)



    
  - name: Widget
    x-displayName: Widget
    description: >
      
      Present the lowest possible instalment for a given product.


      <img src="getfile/raty-najnizsza.png" alt="raty-najnizsza" class="center smallImg">


      Once customers click on the widget, any element may be displayed, for example a pop-up window with information on Przelewy24 I Instalments. 
      
      In order to activate the widget, the following java script must be entered:

      
      <b>MINI version</b>


      <img src="getfile/raty-mini.png" alt="raty-mini" class="smallImg">



      ```javascript
        <body>
          <!-- Tutaj będzie wyświetlony widget z wersją mini -->
          <div id="installment-widget-mini"></div>
          <!-- Osadzenie tagu z paczką -->
          <script type="application/javascript" src="https://apm.przelewy24.pl/installments/installment-calculator-app.umd.sdk.js"></script>
          <script>
            document.addEventListener("DOMContentLoaded", async () => {
              const config = {
                sign: "string",
                posid: 'test', // Payment point identifier posId.
                method: '303',
                amount: 1000, // grosze
                currency: "PLN", // Currency only "PLN"
                lang: "pl",  // for now only pl
                test: false  // Optionally, for use during testing, takes a boolean value
              }
              // Utworzenie konstruktora i podanie configu
              const installmentCalculatorApp = new InstallmentCalculatorApp(config);
              // Creating a mini Widget component
              const miniWidget = await installmentCalculatorApp.create('mini-widget');
              // Render the miniWidget component in the tag with id installment-widget-mini
              miniWidget.render('installment-widget-mini');
            });
          </script>
        </body>
      ```
      
