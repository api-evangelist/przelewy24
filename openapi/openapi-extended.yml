      ## Method clear

      Form allows you to call the `P24.clear()` method to clear a given form field. No parameter will clear the whole form.

       ```javascript
         /* Initializing the card form */
        const P24 = new Przelewy24CardTokenization(merchantId,"sessionId","sign");

        /* Rendering of the iFrame form and additional styling settings*/
        const options = {};    
        P24.render("type", "#id", options);

        /* Clear a particular field or the whole form */
        const clearAll = document.getElementById("clearAll");

        clearAll.addEventListener('click', function () {
            P24.clear();
        })

        ```       
       
        Available function parameters `P24.clear()`:
        <SchemaDefinition schemaRef="#/components/schemas/clear_new"/>
        </br>

      ## Events

      Throughout the process, from creating the form to completing the data or clicking on the card data tokenization button, the appropriate events that match the situation will be passed. The addEventListener method can be used for this purpose.

      ```javascript
         /* Listening for an event with logging it into the consola */
        window.addEventListener('message', (e.data) => console.log(e.data))

        ```    

      <ul><li><b>loading event </b>- sent at the beginning of the form rendering. If the options.loader: true parameter was passed in the render method, this is the moment from which the loader will be visible on the Merchant page.
      <SchemaDefinition schemaRef="#/components/schemas/eventLoading"/>
      </li>
      <ul><li><b>start event </b>- sent after the form is rendered. It is explicit to close the loader, which was started earlier.
      <SchemaDefinition schemaRef="#/components/schemas/eventStart"/>
      </li>
      <ul><li><b>ready event </b>- sent depending on the status of the completed form by the Payer. Event indicates when a particular button embedded in Merchant's page can be activated. Buttons in the iFrame will automatically activate/deactivate depending on the situation.
      <SchemaDefinition schemaRef="#/components/schemas/eventReady"/>
      </li>
      <ul><li><b>success event </b>- sent after the creation of a token allowing the Payer to charge the payment card
      <SchemaDefinition schemaRef="#/components/schemas/eventSuccess"/>
      </li>
      <ul><li><b>fail event</b>- sent when problems are detected, e.g. the card number provided by the Payer is incorrect. Example message values for the error parameter:
       <ul style="list-style-type: '~'; margin-left: 10px;">
        <li><b>minWidth370px</b> - a smaller iframe width than is allowed is given</li>
        <li><b>cardHolderLabelMaxLength40Chars</b> - the allowed number of characters for the labels.cardholder parameter was exceeded</li>
        <li><b>buttonTokenizeLabelRequired</b> - no text specified for card data permanent write button</li>
        <li><b>invalidCardHolder</b> - payer entered incorrect data for cardholder field</li>
        <li><b>aregulationsIsRequired</b> - the payer did not accept the regulations after checking the checkbox</li>
        <li><b>invalidTokenizationType</b> - card data cannot be saved. An attempt to save Click to Pay profile data has occurred</li>
      </ul>
      <SchemaDefinition schemaRef="#/components/schemas/eventFail"/>
      </li>
      </ul>


      ## Tokenization

      Tokenization is possible via a button in the form or by using the tokenize() function. <br><br>

      Tokenization is performed by calling the `P24.tokenize()` method in the JavaScript code.

      
        ```javascript
        /* Initialize card form */
        const P24 = new Przelewy24CardTokenization(merchantId,"sessionId","sign");

        /* Render the iFrame form and additional styling settings */
        const options = {};    
        P24.render("type", "#id", options);

        /* Invoking card tokenization with the appropriate type after pressing the button */
  
        const tokenizeTemp = document.getElementById("tokenizeTemp");
        tokenizeTemp.addEventListener('click', function () {
            P24.tokenize("temporary")
        })
        ```

        The `P24.tokenize()` function can take two properties:
        <ul>
        <li> `"permanent"` - allows you to create a permanent token, which you can then use for oneClick or recurring payments,  </li>
        <li> `"temporary"` - Allows you to create a temporary token for one-time payments. </li>
        </ul>
        
        The `P24.tokenize()` function can take two properties: `"permanent"` or `"temporary"`. The function does not need to be called by listening for the "click" event via addEventListener. It is possible to present a button in an iFrame form by adding a `"tokenize"` or `"tokenize_temporary"` object in the `"options"` object, according to the parameters described in the <a href="#tag/Form-initialization/Styling-and-form-options">Styling and form options</a>.

        ## Basic flow

        Below are the flows for the basic processes of saving card data with attention to the transmitted events.

        <b><i> Flow of saving card data without Click to Pay. Only the buttons object was passed in options. </b></i></br>

        During the creation of the iframe on the merchant page, the loading event will be sent. The start event will be passed as soon as the card form view is rendered. According to the assumptions, until the ready enent is passed with the status set to true, the buttons for saving card data must be inactive. Only after the card data (cardholder's name, card number, expiration date and cvv/cvc of the card) is correctly filled in, will an event be sent ready with the status set to true for both types of buttons (pernament and temporary). If the payer deletes any part of the required data then an event ready with a status of false will be sent. This means that the buttons for saving data must become inactive. Only after the data is correctly completed will the event ready with the status true be sent again. The buttons in the iFrame become active. When you click on one of the buttons, the P24.tokenize method will be called with the appropriate parameter. In response, you may see a fail event with an error message or a success event with the data needed to charge the payer. In order to process the payment later, you need to register the transaction and use a dedicated library for this. <a href="#tag/Card-payment-flow">Read more</a></br>
        <img src="get.php?file=pl_white_label_card.png" alt="Click to Pay payment flow" class="center smallImg"></br>

        
        <b><i> Flow of enrollment of card data from Click to Pay. A buttons object and a c2p parameter with the value true have been passed in options. The payer has the Click to Pay profile stored in the device. </b></i></br>

        During the creation of the iframe on the merchant page, the loading event will be sent. The start event will be passed as soon as the card form view is rendered. According to the assumptions, until the ready enent is passed with the status set to true, the buttons for saving card data must be inactive. Before the view in the iframe is rendered, the verification of the payer's login to Click to Pay by the stored device takes place. If the payer's login to Click to Pay succeeds, an event start will be sent and immediately an event ready with a status of true, but only for the temporary button. At the moment, within Click to Pay there is no possibility to save data pernamentally. When you click on the temporary button, the P24.tokenize method with the temporary parameter will be called. In response, you may see a fail event with an error message or a success event with the data needed to charge the payer. In order to process the payment later, you need to register the transaction and use a dedicated library for this. <a href="#tag/Card-payment-flow">Read more</a></br>
        <img src="get.php?file=pl_white_label_c2p_roz.png" alt="Click to Pay payment flow - recognize the payer" class="center smallImg"></br>

        <b><i> Flow of enrollment of card data from Click to Pay. The options passed a buttons object and a c2p parameter with the value true. The payer does not have the Click to Pay profile memorized with the device. </b></i></br>

        During the creation of the iframe on the merchant page, the loading event will be sent.
        The start event will be passed as soon as the card form view is rendered.According to the assumptions, until the ready enent is passed with the status set to true, the buttons for saving card data must be inactive. Before the view in the iframe is rendered, verification of the payer's login to Click to Pay takes place. If it fails, the card form view with the option to log in to Click to Pay is rendered. The payer selects the option to log in to Click to Pay. He enters his email and then the OTP code. Only after the payer correctly logs into the Click to Pay profile will an event be transmitted ready with a status of true for the temporary button. At the moment, there is no way to save data permanently within Click to Pay. When the temporary button is clicked, the P24.tokenize method will be called with the temporary parameter. In response, you may see a fail event with an error message or a success event with the data needed to charge the payer. In order to process the payment later, you need to register the transaction and use a dedicated library for this. <a href="#tag/Card-payment-flow">Read more</a></br>
        <img src="get.php?file=pl_white_label_c2p_log.png" alt="Click to Pay payment flow - login by payer" class="center smallImg"></br>


         <b><i> Flow of enrollment of card data from Click to Pay. The options passed a buttons object and a c2p parameter with the value true. The payer sets up a Click to Pay profile</b></i></br>

        During the creation of the iframe on the merchant page, the loading event will be sent. The start event will be passed immediately after the card form view is rendered. The assumption is that until the ready enent is passed with the status set to true, the buttons for saving card data must be disabled. Before the view is rendered in the iframe, the payer's login to Click to Pay is verified. If it fails, the card form view with the option to log in to Click to Pay will be rendered. An event ready with a status of true for both types of buttons will be sent after the payer completes the required data (name of the cardholder, card number, expiration date and cvv/cvc of the card). In addition, there will be a checkbox with the option to save the card in Click to Pay. Once it is checked, an event ready will be sent with a status of false for both buttons. A 'next' button will appear in the iFrame. After the payer clicks it, an additional view will be presented asking for email address, phone number and country. Once it is completed correctly, an event ready will be sent with a status of true for the temporary button. At the moment, there is no possibility to save data permanently within Click to Pay. When you click on the temporary button, the P24.tokenize method with the temporary parameter will be called. In response, you may see a fail event with an error message or a success event with the data needed to charge the payer. In order to process the payment later, you need to register the transaction and use a dedicated library for this. <a href="#tag/Card-payment-flow">Read more</a></br>
        <img src="get.php?file=pl_white_label_c2p_new.png" alt="Click to Pay payment flow - new payer" class="center smallImg"></br>

  
      
        
        
  - name: Card payment flow
    x-displayName: Card payment flow
    description: >
    
      The Przelewy24 process allows you to execute card transactions based on standardized JavaScript. The system recognizes the method, userId and transaction registration used and executes the transaction according to them. </br></br>  
       <img src="getfile/karty-dokumentacja-en-ext.jpg" alt="flow procesu kartowego" class="center smallImg"> </br></br>

       <b>One-time payment</b> - register a transaction using  <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">transaction/register method</a> with the token that was passed in the refId parameter in the success type event after using <a href="#tag/Form-initialization-v2/Library">cardTokenizationIframe.min.js</a> library. The cardData.means.referenceNumber parameter should pass the refId value and the TransacationType should take the standard value. In the response, a transaction token will be passed, which must be passed when the script is executed: https://{{environment}}.przelewy24.pl/whitelabel/card/javascript/{{token_transakcyjny}}

       <b>Recurring payment and oneClik</b> - register a transaction using <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">transaction/register method</a> with the token that was passed in the refId parameter in the success type event after using <a href="#tag/Form-initialization-v2/Library">cardTokenizationIframe.min.js</a> library. In the cardData.means.referenceNumber parameter, the refId value should be passed and the TransacationType should take the initial value. In response, you will be given a transaction token, which you need to pass when executing the script: https://{{environment}}.przelewy24.pl/whitelabel/card/javascript/{{token_transakcyjny}}.  Any subsequent use of the token from the refId parameter for subsequent transactions will require a corresponding change in the TransacationType parameter to a value of oneClick or recurring, depending on the type of transaction that will take place. 
      
             
      JavaScript Callback:
       ```
        <!doctype html>
        <html lang="en">
        <body>
        <div id="thisIsTargetObject"></div>
        <div id="starter"></div>
        <div id="merchantMessageObject"></div>
        <div id="finalMessage"></div>
        <script>
                document.addEventListener("Przelewy24CardWhileLabelHandlerReady", (event) => {
                    Przelewy24CardWhileLabelHandler.config({
                        "P24TargetElementId": "thisIsTargetObject",
                        "P24CardWhiteLabelStartEventCallback": (event) => {
                            document.getElementById("starter").innerHTML = "Script stared";
                            console.log("Start on merchant site");
                        },
                        "P24NeedInteractionEventCallback": (event) => {
                            console.log("Need interaction on merchant site");
                            document.getElementById("merchantMessageObject").innerHTML = "Interaction needed";
                        },
                        "P24DontNeedInteractionEventCallback": (event) => {
                            console.log("Don't need interaction on merchant site");
                            document.getElementById("merchantMessageObject").innerHTML = "Interaction omitted";
                        },
                        "P24ScriptFailedEventCallback": (event) => {
                            console.log("Fail!");
                            console.log(event.message);
                            document.getElementById("finalMessage").innerHTML = "Script failed";
                        },
                        "P24ScriptSuccessfulEndsEventCallback": (event) => {
                            console.log("Success!");
                            document.getElementById("finalMessage").innerHTML = "Script ends with success";
                        }
                    });
                    Przelewy24CardWhileLabelHandler.main();
                });
        </script>
        <script src="https://{{environment}}.przelewy24.pl/whitelabel/card/javascript/{{token}}"></script>
        </body>
        </html>
       ```        

  - name: Recursion (doPayment)
    x-displayName: Recurrence
    description: >
     In order to register a recurring transaction, it is necessary to send transaction registration request first to  <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post">/transaction/register</a> endpoint. . For the transaction to be performed, the `“cardData”` object must be added in the transaction registration request.

      ```json
      {
        "cardData": {
          "means": {
            "card": {
              "pan": "1234123412341234",
              "expYear": "2027",
              "expMonth": "01",
              "clientName": "Name and surname",
              "securityCode": "123"
            }
          },
          "transcationType": "recurring",
          "traceID": ""
        }
      }
      ```

      Description of the specific parameters of the object:
      - the `"card"` object contains card data such as:
        - `"pan"` - 16-digit card number
        - `"expYear"` - card expiry year
        - `"expMonth"` - card expiry month
        - `"securityCode"` – CVV/CVC code
      - `"transactionType"` - takes the “recurring” value
      - `"traceID"` - initiating transaction reference number (required for recurring, if the following have been provided: card, schemeToken)

      Provided that all the parameters in the <a href="#tag/Transaction-service-API/paths/~1api~1v1~1transaction~1register/post"> transaction registration </a>request are correct, a token required for  `transaction/doPayment` request is returned in response.

