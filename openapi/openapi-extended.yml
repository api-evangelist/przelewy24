  - name: Mobile payment (Android)
    x-displayName: Mobile payment (Android)
    description: >
      
       ## Introduction 

       P24 SDK is a mobile library for Android designed to facilitate various payment processes. It offers a few modules, including `core`, `card-tokenize` and `card-charge`. This documentation focuses on the integration and use of the card-tokenize module for the tokenization of card data with the use of a secure form.

        - `core` -  basic functionalities required for SDK P24
        - `card-tokenize` - allows card tokenization via the form
        - `card-charge` - allows cards to be charged

        <b>Card Tokenization Module</b><br>
        The `card-tokenize` module allows safe tokenization of card details by means of a nested form. The module provides an easy-to-use interface for collecting and tokenizing card information, which is crucial for ensuring PCI conformity and safe payment processing.

       
        ## Card tokenization

        ### Card tokenize initialization
        <b>Download and import</b><br>
        The SDK P24 pack is currently available in the form of a .zip file containing Maven repository. In order to add it to your project, perform the following steps:

        Download the SDK P24 .zip file from the source provided. Next, extract the .zip file to the requested location. 

        <b>Adding to Dependencies</b><br>
        Add the local Maven repository to your build.gradle:

        ```json
        repositories {
            maven {
                url uri('/path/to/unzipped/repository')
            }
        }
        ```

         Add the `core` and `card-tokenize` dependencies to your dependencies block:
         ```json
         dependencies {
             implementation 'pl.p24.sdk:core:1.0.0'
             implementation 'pl.p24.sdk:card-tokenize:1.0.0'
         }
         ```
        ### Load module

        Before you make the first request, it is best to load the module at application startup:

        ```kotlin
        P24.install(
          CardTokenizeModule
        )
        ```


        ### Creating a Tokenize Card Request

        To initialize the card tokenization form, create a `TokenizeCardRequest` using the `TokenizeCardRequestBuilder`. Here’s how to set up and start the process in Kotlin:<br><br>

        <b>Step 1. Create the Request Builder</b>
          ```kotlin
          val request = TokenizeCardRequestBuilder()
        .merchantId("your-merchant-id")
        .sessionId("your-session-id")
        .sign("checksum-signature")
        .allowedModes(setOf(TokenizationMode.Permanent, TokenizationMode.Temporary))
        .environment(Environment.Sandbox)
        .formStyle(FormStyle())  // Example style, actual styles TBD
        .termsOfServiceConfig(TermsOfServiceConfig())
        .callback(object : TokenizationCallback {
            override fun onStarted() {
                // Handle start of the tokenization process
            }
            override fun onSuccess(tokenizedCard: TokenizedCard) {
                // Handle successful tokenization
            }
            override fun onFailed(errors: List<String>) {
                // Handle failure with error messages
            }
            override fun onCanceled() {
                // Handle user cancellation
            }
        })
        .build()
          ```
        <b>Steo 2. Start the Tokenization Process</b>
        ```kotlin
        request.start()
        ```

        <b>Parameters Explained:</b>
        
        `merchantId` -  Your unique merchant identifier. <br>
        `sessionId` - The session ID for tracking the request.<br>
        `sign` -  A checksum or signature for request validation.<br>
        `allowedModes` -   Set of allowed tokenization modes (`TokenizationMode.Permanent`, `TokenizationMode.Temporary`).<br>
        `environment` -  Determines the API environment (`Environment.Production`, `Environment.Sandbox`).<br>
        `formStyle` -  Style of the form. More details provided in section: <b>"Form styling"</b><br>
        `callback` -  Call back interface for managing various stages of tokenization.<br>

        ### Form styling

        The `FormStyle` class is used for defining the layout of the card tokenization form. It allows to adjust various entry fields and buttons in order to adjust them to the app design and improve user comfort. 

        <b>Components of FormStyle</b>

        - <b>cardNumber</b>: adjusts the style in the card number field.
        - <b>cardHolder</b>: adjusts the style in the cardholder field.
        - <b>cvv</b>: adjusts the style in the CVV field.
        - <b>expiryDate</b>: adjusts the style in the card expiry date field.
        - <b>payButton</b>: adjusts the style of the pay button.
        - <b>saveAndPayButton</b>: adjusts the style of the “Save and Pay” button. 

        <br><b>InputStyle and ButtonStyle</b>

        The `InputStyle` i `ButtonStyle` classes define how the input fields and buttons are styled.

        Class `InputStyle`:
        - <b>placeholder</b>: text displayed in the field, the co-called placeholder.
        - <b>label</b>: text of the label displayed above or next to the entry field.
        - <b>border</b>: defines the border style, including the border color.
        - <b>background</b>: entry field background. 

        Class `ButtonStyle`:
        - <b>label</b>: Text displayed on the button.
        - <b>color</b>: The background color of the button.
        - <b>labelColor</b>: The color of the button text.

        <br><b>"Terms of service" configuration</b>

        The `TermsOfService` class is used to define the behavior and visibility of the Terms of Service (ToS) checkbox in the card tokenization form. It allows customization in order to ensure that users proceed to the payment process only after they have accepted the terms. 

        Components of `TermsOfServiceConfig`:
        - <b>isVisible</b>: Determines whether the Terms of Service info is visible to the user. The default value is `true`, meaning it will be shown by default.
        - <b>checkbox</b>: Customizes the behavior and initial state of the checkbox through the `TOSCheckbox` data class.
        <br>

        <br>The `TOSCheckbox` class provides further ToS checkbox adjustment options.

        - <b>isUserAllowedToChange</b>: indicates whether the user may change the checkbox status. In case the false value is selected, the checkbox will be displayed, yet not interactive. 

        - <b>isChecked</b>: sets the initial state of the checkbox. The default value is false, which indicates that the checkbox  is not initially checked.

        ## Card charge

        Please download the P24 SDK file `p24-repository.zip` from the provided source. Then, extract the .zip file to your desired location.

        Then add the repository in Gradle:
        ```
        maven {
            url("/PATCH_TO_DIR_WITH_REPO/p24-repository")
        }
        ```

       Then add a dependency in the `dependencies`` section:

       ```json
        implementation("pl.p24.sdk:card-charge:0.0.1")
       ```

       <b>Preparing a request for the SDK:</b>
        ```json
        val request = P24.cardRequest()
          .token(p24Token)
          .environment(Environment.Sandbox) //default Environment.Production
          .callback { event -> ... }
          .build()
          ```
        <b>Launching:</b>
        ```json
        request.start()
       ```

        <b>Process interruption:</b>
          ```json
          request.cancel()
        ```

        <b>Event types</b>: 
        - ProcessStarted
        - Need3DS
        - ProcessCompleted
        - ProcessCanceled
        - ProcessError        

