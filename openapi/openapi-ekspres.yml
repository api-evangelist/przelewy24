  description: >



    # Ekspres Przelewy24


    Przelewy24 provides an authorisation and clearing system and provides payment services as a Domestic Payment Institution. <br><br/>

    <b><b>Ekspres-Przelewy24</b> service allows to quickly and effortlessly send money between accounts from different banks.</b><br/><br/>

    Below documentation describes the process of information exchange in the course of ordering a transfer via Ekspres Przelewy24 with the use of REST API.<br/><br/>

    In order to be able to access Ekspres API Przelewy24, first you need to [create an account](https://ekspres.przelewy24.pl/kontakt/index) in Ekspres P24 Administration Panel.

    <br/>

    # Basic notions

    The following notions will be used for describing the operation of Ekspres Przelewy24:<br/><br/>
    **WWW system** – access to Ekspres Przelewy24 in the WWW version through the following websites:<ul>
        <li>[https://ekspres.przelewy24.pl](https://ekspres.przelewy24.pl) – production version,</li>
        <li>[https://testekspres.przelewy24.pl](https://testekspres.przelewy24.pl) – sandbox version.</li></ul>
    **API** – access to Ekspres Przelewy24 via REST API. <br/>
    **Partner** – a person / entity owning the system and submitting transfer orders to Ekspres.<br/>
    **Client** – a person using Ekspres services (payer or recipient of payment from Ekspres).


    # Modes and transfer processing

    Ekspres Przelewy24 offers 3 modes of transfer processing:<ul>
    <li><b>Wallet</b> - transfers are processed using the funds previously paid into the wallet,</li>
    <li><b>P24</b> i <b>P24mobile</b> - transfers are processed only after the client has made the payment in [przelewy24.pl](https://www.przelewy24.pl),</li>
    Each of these modes allows the client to monitor the progress of the transfer by providing them with a dedicated URL address (available upon transfer registration).


    ## Transfer processing in Wallet

    <b>Wallet</b> is characterized by quick processing of transfers to the client. Thanks to the funds accrued in the wallet, it is possible to effect immediate processing of a transfer registered by the Partner.<br/><br/>


    <img src="getfile/eng_wallet.png" alt="Transfer w trybie Wallet" class="center smallImg">



    ## Transfer processing in P24 and P24mobile

    <b>P24</b> and <b>P24mobile</b> processes payments based on the funds paid in by the Client through [przelewy24.pl](https://www.przelewy24.pl). Using this mode, the partner registers the transfer in API and, subsequently, sends a payment link to the client (alternatively, the payment link may also be sent automatically via email). Once the transaction is paid by the client in [przelewy24.pl](https://www.przelewy24.pl), the transfer registered by the partner is sent for processing.<br/><br/>

    <b>NOTE: P24mobile is analogous to P24 in that it is designed to operate with a mobile library.</b><br/><br/>


    <img src="getfile/eng_p24_p24mobile.png" alt="Transfer w trybie P24 i P24mobile" class="center smallImg">

    

    # Codes of responses and erros

    ## HTTP response codes

    Ekspres Przelewy24 REST API uses response codes in HTTP headers to communicate the result of a query, potential problems and errors. <br/><br/>
    An inventory of possible response codes and their meanings are explained in the appropriate subchapters describing the specific methods.<br/><br/>
    <b>Always take note of the response code in order to react adequately to potential problems idempotent replies, etc.</b><br/><br/>

    <b>Possible response codes for all methods:</b>

      | Kod   |      Opis      |  Znaczenie |
      |--------------|:--------------|:------------|
      | 401  |   Authorization Required   | No access, check the key and the password, check if the key and the password are active and valid for this method. The code is also used to signal temporary failures. |
      | 403 |  Forbidden  | No access to a given method. The API key and the password are correct. Contact our staff in order to get access.  |
      | 404 | Not Found | Method not found, check the URL address called. |
      | 405 | Method Not Allowed | The method used exists, but under a different http call. Check the calls for this method (GET/POST/etc.).|
      | 415 | Unsupported Media Type | The „Content-Type” value used is not allowed or a required header is missing. Inventory of allowed values available at <a href="#section/General-structures-of-queries-and-responses/General-query-format"><b>General query format</b></a>. |
      | 500 | Internal Server Error | Server error, if the error recurs, contact our staff and provide the whole query processed, as well as your API key. |
      | 503 | Service Unavailable | Service temporarily unavailable due to a failure or planned upgrade.   |


    ## Error codes

    Error codes appear in the output object of a query that ended with an error and, if it’s possible, indicate its cause. This allows to precisely establish the cause of the error and triggers an automatic reaction / error notification. <br/><br/>

    Error codes are divided into the following groups:<ul>
    <li><b>1xxx</b> – input parameter validation error (the query contains an error),</li>
    <li><b>2xxx, 3xxx</b> – transfer registration error (the query is correct, but the transfer cannot be processed, e.g. due to insufficient funds),</b>
    <li><b>9xxx</b> – external services error (API failure caused by unavailability of a related service necessary to process the transfer, e.g. currency exchange),</li>
    <li><b>10000</b> – internal error (failure of Ekspres Przelewy24 REST API).</li></ul>

    <b>NOTE! When implementing API error service, in order to identify the error, rely solely on the codes, as the “description” parameter may change and constitutes additional information only!</b><br/><br/>

    The table below presents error codes <b>input parameter validation:</b>

      | Error code   |      Description      |
      |--------------|:--------------|
      | 1001  | The value of parameter <b>parameter_name</b> contains illicict characters |
      | 1002  | Parameter <b>parameter_name</b> value must not be empty |
      | 1003  | Passwords are not identical |
      | 1004  | The password must consist of at least 8 characters and contain small and capital letters and digits |
      | 1005  | Incorrect email address |
      | 1006  | Incorrect postal code |
      | 1007  | Incorrect country code |
      | 1008  | Incorrect amount |
      | 1009  | The <b>parameter</b> value submitted is not a correct integer |
      | 1010  | Incorrect currency |
      | 1011  | Incorrect account number |
      | 1012  | Incorrect URL address |
      | 1013  | Transaction type not serviced |
      | 1014  | Incorrect field value |
      | 1015  | Current transfer status prevents this operation, or incorrect transfer object |
      | 1016  | Incorrect date format / incorrect date |
      | 1017  | Incorrect query signature |
      | 1018  | Parameter value too long |
      | 1019  | IBAN number submitted has been blocked |

    <br/>The table below presents <b>transfer registration error codes:</b>

      | Error code   |      Description   |
      |--------------|:--------------|
      |  2001	| Bank unavailable |
      |  2002 |	Insufficient funds in wallet |
      |  2003	| Limit for a single transfer has been exceeded |
      |  2004	|	Daily limit on the amount of transfers paid has been exceeded |
      |  2005	| Transfer ID not recognised |
      |  2006	| Refund amount provided exceeds the transfer value available |
      |  2007	| Access denied |
      |  2008	| Incorrect transfer ID |
      |  2009	| Transfer limit exceeded |
      |  2010	| Transfer already returned in P24 mode |
      |  3000	| Incorrect ID query |
      |  3001	| Unknown sessionId in P24 mode |

    <br/>The table below presents <b>error codes for external services:</b>

      | Error code   |      Description      |
      |--------------|:--------------|
      | 9001 |	Transfer processing error. Contact the customer service department and provide the query ID |
      | 9002 |	Currency exchange error. Please, try again |

    <br/>The table below presents the <b>remaining error codes:</b>

      | Error code   |      Description      |
      |--------------|:--------------|
      | 10000 |	Internal error. Please, contact the customer service department and provide the query ID |



    # General structures of queries and responses

    ## General query format

      API queries may be processed using any library that allows HTTPS protocol-based communication. Allowed Content-Type values:<ul>
      <li><b>application/json</b> – queries sent in JSON format,</li>
      <li><b>application/x-www-form-urlencoded</b> – queries sent as POST (urlencoded).</li></ul>

      <b>Required coding to UTF-8.</b><br/>

      Sample PHP code with the use of cURL
      ```php
          <?php
          $process = curl_init('https://endpoint/ekspres/v1/balance');
          // Content-Type header required
          curl_setopt(
            $process,
            CURLOPT_HTTPHEADER,
            array('Content-Type: application/json')
          );
          // Basic Auth authentication
          curl_setopt($process, CURLOPT_USERPWD, 'api-key' . ":" . 'api-pass');
          curl_setopt($process, CURLOPT_RETURNTRANSFER, true);
          $return = json_decode(curl_exec($process));
          echo json_encode($return, JSON_PRETTY_PRINT) . "n";
          curl_close($process);
      ```

    ## General response format

    A correct method call in Ekspres Przelewy24 REST API will generate a response in the form of a JSON object, in the format dependent on the method called.<br/>
    <p style="border:1.5px; border-style:dashed; border-color:#FF0000; padding: 1em;">
    <b>NOTE!</b><br/><br/>
    All the responses returned by API are <b>UTF-8-coded JSON objects without “slash” sign filters and unicode characters!</b><br/><br/>
    All the responses are returned using the following method:<br/>
    json_encode($response, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES)<br/><br/>
    For more information see [PHP documentation](https://www.php.net/manual/en/json.constants.php).
    </p><br/>

    In the case of some errors, e.g. internal error 500 or authorisation error 401, the same http code will be returned without additional information in the body. These are the cases when the system does not have any more information on the error or does not want to make it available (for instance, due to lack of authorisation). <br/><br/>

     When most errors are generated, GeneralErrorObject is returned (in addition to the relevant http code) with additional details:<br/>

      <b>GeneralErrorObject:</b>

      | Field name   |      Type    |  Description |
      |--------------|:--------------:|:------------|
      | code  |     int   | General <a href="#section/Codes-of-responses-and-erros/Error-codes"><b>error code</b></a>  |
      | description |  string  | Error details   |

      <p style="color:darkblue; font-size:17px"><b>Przykład odpowiedzi z obiektem GeneralErrorObject:</b></p>

        ```html
            HTTP/1.1 400 Bad Request
              Content-Type: application/json

              {
                „error”: {
                  „code”: 1011,
                  „description”: „Given IBAN value ”iban” is not valid”
                }
              }
        ```


    # Environments

    ## Production environment

    Every request is differentiated by its own unique request URL. This way Ekspres P24 knows which API-function you want to access. Combined with the base URL for either the production- or test-environment, you will get the complete API-URL.


    Base URL production system:<br/>
    https://secure.przelewy24.pl/express/v1


    ## Test environment

    During implementation of the mechanisms in merchant’s system, it is recommended to use test environment. Test environment allows to reproduce system functionalities without making actual payments. <br><br>

    Test environment endpoint:<br>
    https://sandbox.przelewy24.pl/express/v1 <br><br>

    **<u>The test version does not effect transfers and requires separate login keys.</u>**


    # IP server addresses

    We recommend script protection against suspicious calls using address filtering for incoming connections. IP server ranges for the P24 servers: <br><br>
    <font class = "right"><b>5.252.202.255 , 5.252.202.254</b></font><br>
    <font class = "right"><b>20.215.81.124</b></font><br>
    <font class = "right"><b>193.178.213.0/24</b></font><br>
    <font class = "right"><b>91.220.177.0/24</b></font><br>
    <font class = "right"><b>20.215.183.48/28</b></font><br>
    <font class = "right"><b>134.112.88.8/29</b></font><br>



    # API Access

    Authentication is effected with the Basic Auth mechanism, which uses a REST API key (as a login) and the password assigned to it. Generating the API key is possible upon logging on to one’s account in the  <a href="#section/Basic-notions"><b>WWW System</b></a> (left-hand menu, tab “API Users” -> “REST User List”). A single user may possess a few API access keys.

    # Authentication

