        | Code  |      Name    |  English equivalent  |
        |------|:--------------|:------------|
        | 1  |    Zarejestrowana   | Registered |
        | 2	| Przekazany do realizacji |	Sent to processing |
        | 3	| Błąd przekazania do realizacji |	Error while sending to processing |
        | 4	| Opłacona |	Paid |
        | 5	| Wypłacona |	Finished |
        | 6	| Przeterminowana |	Expired |
        | 7	| Błąd podczas wypłaty	| Error while processing |
        | 8	| Błąd opłacenia transakcji	| Error while payment |
        | 9	| Wypłacona przez zewnętrznego operatora	| Finished by external operator |
        | 10	| Zlecony zwrot	| Refund commissioned |
        | 11	| Zwrot zrealizowany	| Refund finished |
        | 12	| Zwrot odrzucony |	Refund rejected |
        | 13	| Błąd podczas realizacji zwrotu | Error while refunding |
        | 14	| Zwrot zarejestrowany |	Refund registered |
        | 15	| Wypłacona zwrócona |	Finished and refunded |
        | 16	| Anulowana |	Canceled |
        | 17	| Oczekuje na dane |	Pending for data |


  - name: Transfer scenarios
    x-displayName: Transfer scenarios
    description: >

      # Introduction

      Below are transfer scenarios that occur most frequently. Subsequent transfer statuses are indicated.
       <p style="border:1.5px; border-style:dashed; border-color:#FF0000; padding: 1em;">
      <b>Note!</b><br/><br/>
      For status 1 “Registered”  <b>no notification is sent!</b><br/><br/>
      This is because it is an input status, i.e. obtaining the correct response from API during transfer registration serves to inform that it was assigned this status.
      </p>

      # Correct transfer

      **1** Registered &rightarrow; **4** Paid &rightarrow; **2** Sent to processing &rightarrow; **5** Paid out

      # Transfer stopped in Ekspres application

      <b>The funds are returned to the wallet.</b><br/><br/>

      **1** Registered &rightarrow; **4** Paid &rightarrow; **3** Error while sending to processing

      # Transfer stopped at payout at the bank

      <b>The funds are returned to the wallet.</b><br/><br/>

      **1** Registered &rightarrow; **4** Paid &rightarrow; **2** Sent to processing &rightarrow; **5** Paid out &rightarrow; **7** Processing error

      # Transfer finished and refunded

      <b>The funds are returned to the wallet.</b><br/><br/>

      **1** Registered &rightarrow; **4** Paid &rightarrow; **2** Sent to processing &rightarrow; **5** Paid out &rightarrow; **15** Paid out and refunded

      # Insufficient funds to make a transfer that has already been initiated

      <b>Funds have not been collected.</b><br/><br/>

      **1** Registered &rightarrow; **4** Paid &rightarrow; **8** Payment error
