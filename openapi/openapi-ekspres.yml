tags:
  - name: Calculation of sign parameter
    x-displayName: Calculation of sign parameter
    description: >

      # Calculation of sign parameter for API methods

      The <b>sign</b> parameter is used to sign queries which trigger registration of transfers or process other important operations. It is always accompanied by the “id” parameter, which guarantees the idempotent character of the method.
      <p style="border:1.5px; border-style:dashed; border-color:#FF0000; padding: 1em;">
      <b>Note!</b><br/><br/>
      The <b>sign</b> parameter for  <a href="#tag/Notifications-on-transfer-status"><b>notifications</b></a> is calculated in a different manner than for calling methods.<br/><br/>
      For details concerning the calculation of the signature for notifications, see: <a href="#section/Calculation-of-sign-parameter-for-notifications"><b>Calculation of sign parameter for notifications</b></a>.</b><br/>
      </p>

      The signature results from the application of the hash sha384 method and consists of the following parameters:<br/><ul>
      <li><b>apiKey</b> – user API key,</li>
      <li><b>apiPass</b> – password to user API key,</li>
      <li><b>object</b> – JSON object of internal method query <b>no unicode or slash sign filtering</b>,</li>
      <li><b>id</b> – „id” parameter for a given query,</li>
      <li><b>crc</b> – CRC value for a given API key.</li></ul>

      The parameters above should be transferred as JSON object, <b>without unicode or slash sign filtering</b>, to the hash method. The result of this calculation constitutes a correct signature.<br/><br/>

      <b>NOTE! The order of the parameters transferred MATTERS, both for the general object and the internal value “object”.</b><br/><br/>

      Sample signature:<br/>

      ```php
          <?php
          // $data is a sample transfer from /v1/transfer/request
          // Creating signArray parameter in order to calculate sign parameter
          $signArray = [
              'apiKey' => 'api-key',
              'apiPass' => 'api-key-password',
              'object' => json_encode(
                  $data['transfer'],
                  JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES
              ),
              'id' => $data['id'],
              'crc' => 'api-crc-key'
          ];
          // Calculating sign parameter
          $data['sign'] = hash(
              'sha384',
              json_encode($signArray, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES)
          );
      ```

      # Calculation of sign parameter for notifications

      In the case of <a href="#tag/Notifications-on-transfer-status"><b>notifications on the change of transfer status</b></a> which are sent to the Partner’s destination point configured for a given key, the “sign” parameter included in them should be calculated and verified to ensure that they come from a correct source.
      <p style="border:1.5px; border-style:dashed; border-color:#FF0000; padding: 1em;">
      <b>Note!</b><br/><br/>
      The <b>sign</b> parameter for the API methods is calculated in a different manner than for notifications.<br/><br/>
      For details concerning the calculation of the signature for transfers, see: <a href="#section/Calculation-of-sign-parameter-for-API-methods"><b>Calculation of sign parameter for API methods</b></a>.</b><br/>
      </p>

      The signature results from the application of the hash sha384 method and consists of the following parameters:<br/><ul>
      <li><b>type</b> – type of notification,</li>
      <li><b>id</b> – transfer identifier provided,</li>
      <li><b>status</b> – new transfer status provided,</li>
      <li><b>crc</b> – CRC value for a given API key.</li></ul>

      <b>Parameters type, id and status come directly from the received notification. For details concerning the parameters included in the notifications, see <a href="#tag/Notifications-on-transfer-status"><b>Notifications on transfer status</b></a>.</b><br/><br/>

      The parameters above should be transferred as JSON object, <b>without unicode or slash sign filtering</b>, to the hash method. The result of this calculation constitutes a correct signature.<br/><br/>

      <b>NOTE! When calculating the sign, please take care not to change the order of the parameters you received.</b>

      Sample calculation of the signature for the notification received:<br/>

      ```php
          <?php
          // $data is the received POST response
          // Creating signArray parameter in order to calculate sign parameter
          $signArray = [
              'type' => $data['type'],
              'id' => $data['id'],
              'status' => $data['status'],
              'crc' => 'api-crc-key'
          ];
          // Calculating sign parameter
          $data['sign'] = hash(
              'sha384',
              json_encode($signArray, JSON_UNESCAPED_UNICODE | JSON_UNESCAPED_SLASHES)
          );
      ```
  - name: Notifications on transfer status
    x-displayName: Notifications on transfer status
    description: >

      Whenever the status of a transfer/refund changes in Ekspres, a notification may be sent. The address for notifications may be configured in the <a href="#section/Basic-notions"><b>WWW system</b></a>, in the API key settings. The notification will have the structure presented in the table below and will be sent as JSON object using the POST method. Sending a notification requires a response from the partner’s server with code 200.<br/><b> If the response code is different, the notification will be repeated after 5, 10, 15, 20, 25, 55 and 95 minutes.</b>
      <p style="border:1.5px; border-style:dashed; border-color:#FF0000; padding: 1em;">
      <b>Note!</b> Special attention should be given to parameters <b>type</b> and <b>id</b>!<br/><br/>
      Parameter <b>type</b> specifies the value that parameter <b>id</b> possess.<br/><br/>
      In case the value is <b>pay</b>, parameter <b>id</b> will have transferRequestId identifier.<br/><br/>
      In case the value is <b>payout</b>, parameter <b>id</b> will have transferId identifier.<br/><br/>
      In case the value is <b>refunded</b>, parameter <b>id</b> will have refund identifier.<br/><br/>
      <b>All the identifiers are unique</b>, nd they should be considered separately. <u> If they are confused, the respective transfers may be ascribed wrong statuses.</u>
      Use <b>externalParam</b> to ascribe notifications in a simpler way according to an independently assigned identifier.
      </p>

      # Notification

      TransferNotificationObject:<br/>

      <SchemaDefinition schemaRef="#/components/schemas/NotificationTransferStatusBody" />

