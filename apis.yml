name: Przelewy24
description: >-
  Przelewy24 is Poland's leading online payment gateway, providing REST APIs
  for bank transfer payments, card processing, BLIK mobile payments, and
  multi-currency payment processing for e-commerce merchants. With 91% brand
  recognition among Polish online customers, the platform connects merchants
  to over 165 Polish banks and supports payment methods including online bank
  transfers, credit and debit cards, BLIK, Google Pay, digital wallets, and
  prepaid cards. The API supports PLN and EUR currencies and enables
  transaction registration, payment verification, refunds, and real-time
  webhook notifications for payment events.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/przelewy24/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
