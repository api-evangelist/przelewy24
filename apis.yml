apis:
  - name: Przelewy24 REST API
    description: >-
      The Przelewy24 REST API (v1) provides endpoints for registering and
      verifying payment transactions, retrieving available payment methods,
      processing card payments with optional 3D Secure authentication,
      initiating refunds, and querying transaction details by session ID.
      Authentication uses HTTP Basic Auth with the merchant's POS ID and API
      key, and transaction integrity is secured via SHA-384 signatures using
      the merchant CRC key.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.przelewy24.pl/
    baseURL: https://secure.przelewy24.pl/api/v1
    tags:
      - Payments
      - Bank Transfer
      - BLIK
      - Card Payments
      - Refunds
      - Multi-Currency
    properties:
      - type: Documentation
        url: https://developers.przelewy24.pl/
      - type: Sandbox
        url: https://sandbox.przelewy24.pl/api/v1
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/przelewy24/refs/heads/main/openapi.yml
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/przelewy24/refs/heads/main/plans/plans.yml
      - type: RateLimits
        url: https://raw.githubusercontent.com/api-evangelist/przelewy24/refs/heads/main/rate-limits/rate-limits.yml
      - type: FinOps
        url: https://raw.githubusercontent.com/api-evangelist/przelewy24/refs/heads/main/finops/finops.yml
    contact:
      - FN: Przelewy24 Developer Support
        url: https://www.przelewy24.pl/en/help-center/api-technical-support
        email: ''

  - name: Przelewy24 Marketplace API
    description: >-
      The Przelewy24 Marketplace API extends the core payment gateway for
      marketplace and platform use cases, enabling split payments between
      marketplace operators and sellers, multi-vendor transaction routing,
      and seller onboarding workflows. It supports the distribution of funds
      to multiple beneficiaries within a single transaction.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.przelewy24.pl/marketplace/
    baseURL: https://secure.przelewy24.pl/api/v1
    tags:
      - Marketplace
      - Split Payments
      - Multi-Vendor
      - Platform Payments
    properties:
      - type: Documentation
        url: https://developers.przelewy24.pl/marketplace/
    contact:
      - FN: Przelewy24 Developer Support
        url: https://www.przelewy24.pl/en/help-center/api-technical-support
        email: ''

  - name: Przelewy24 Extended API
    description: >-
      The Przelewy24 Extended API provides additional payment capabilities
      beyond the standard REST API, including advanced reporting, batch
      operations, recurring payment handling, and access to extended
      transaction data. It is intended for enterprise merchants requiring
      deeper integration with Przelewy24's payment infrastructure.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.przelewy24.pl/extended/
    baseURL: https://secure.przelewy24.pl/api/v1
    tags:
      - Reporting
      - Recurring Payments
      - Enterprise
      - Batch Processing
    properties:
      - type: Documentation
        url: https://developers.przelewy24.pl/extended/
    contact:
      - FN: Przelewy24 Developer Support
        url: https://www.przelewy24.pl/en/help-center/api-technical-support
        email: ''

  - name: Przelewy24 Ekspres API
    description: >-
      The Przelewy24 Ekspres API provides fast-pay functionality for
      registered Przelewy24 users, enabling one-click payments without
      the need for customers to re-enter banking credentials. It streamlines
      the checkout experience for returning customers who have previously
      authenticated with Przelewy24.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developers.przelewy24.pl/ekspres/
    baseURL: https://secure.przelewy24.pl/api/v1
    tags:
      - Fast Pay
      - One-Click
      - Express Payments
    properties:
      - type: Documentation
        url: https://developers.przelewy24.pl/ekspres/
    contact:
      - FN: Przelewy24 Developer Support
        url: https://www.przelewy24.pl/en/help-center/api-technical-support
        email: ''

